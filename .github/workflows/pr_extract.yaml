name: Extract cart source

# When a PR adds/updates a .lz100.png cartridge, decode the source hidden inside it and post it
# as a code block on the PR, so reviewers can read the real cart without the console.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths: ["games/**/*.lz100.png"]

permissions:
  contents: read
  pull-requests: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install Pillow

      - name: Decode changed cart PNGs
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -e
          files=$(git diff --name-only --diff-filter=AM "$BASE" "$HEAD" -- '*.lz100.png' || true)
          {
            echo "<!-- lz100-extract -->"
            echo "🤖 **Cart source extracted from the PNG cartridge(s)** — for review (code section only)."
            echo ""
            if [ -z "$files" ]; then echo "_No \`.lz100.png\` files changed._"; fi
            for f in $files; do
              echo "<details><summary><code>$f</code></summary>"
              echo ""
              echo '```lua'
              # header + __lua__ code, stopping before the binary gfx/map/sfx/music/label sections
              python3 scripts/lz100png_decode.py "$f" 2>/dev/null \
                | awk 'BEGIN{s=1} /^__(gfx|gff|map|sfx|music|label)__$/{s=0} s' \
                | head -c 55000
              echo ""
              echo '```'
              echo "</details>"
              echo ""
            done
          } > comment.md

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            const marker = '<!-- lz100-extract -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });

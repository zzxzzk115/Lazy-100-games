name: Extract cart source

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "games/**/*.lz100.png"

# NOTE: commenting on a PR goes through the *issues* REST endpoint, but the token permission
# GitHub checks for it is pull-requests: write (issues: write only covers real issues).
permissions:
  contents: read
  pull-requests: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      # Checkout trusted base repo only. Do NOT execute code from the fork.
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip Pillow

      - name: Get changed cart files
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );

            const carts = files
              .filter(f =>
                ['added', 'modified'].includes(f.status) &&
                f.filename.startsWith('games/') &&
                f.filename.endsWith('.lz100.png')
              )
              .map(f => f.filename);

            fs.writeFileSync('changed_carts.txt', carts.join('\n'));

      - name: Download and decode changed cart PNGs
        env:
          HEAD: ${{ github.event.pull_request.head.sha }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          # Helper scripts (run against PR DATA only; the code executing them is from base).
          cat > meta_row.py <<'PY'
          import json, sys
          try:
              j = json.load(open("pr_games.json", encoding="utf-8"))
              for g in j.get("games", []):
                  if g.get("cart") == sys.argv[1]:
                      tags = ", ".join(g.get("tags", []))
                      print("| `%s` | %s | %s | %s | %s |" % (
                          g.get("id", "?"), g.get("version", "?"),
                          g.get("category", "?"), tags, g.get("license", "?")))
                      break
          except Exception:
              pass
          PY
          cat > same_cart.py <<'PY'
          import sys
          # Whitespace-tolerant: trailing spaces and blank lines don't make a cart "different"
          # (editors add/drop them freely); only real content divergence should warn.
          # The __label__ section (last in the file) is stripped too: it is the screenshot
          # cartshot generates at PNG pack time and legitimately absent from .lz100 sources.
          def norm(p):
              txt = open(p, encoding="utf-8", errors="replace").read()
              txt = txt.split("\n__label__\n")[0]
              lines = [l.rstrip() for l in txt.split("\n")]
              return [l for l in lines if l]
          sys.exit(0 if norm(sys.argv[1]) == norm(sys.argv[2]) else 1)
          PY

          # The PR's games.json (data): used to show id/version/category metadata.
          curl -fsSL "https://raw.githubusercontent.com/$HEAD_REPO/$HEAD/games.json" -o pr_games.json \
            || echo '{"games":[]}' > pr_games.json

          {
            echo "<!-- lz100-extract -->"
            echo "🤖 **Cart check** — decoded from the PNG cartridge(s) for review."
            echo ""

            if [ ! -s changed_carts.txt ]; then
              echo "_No \`.lz100.png\` files changed._"
            fi

            # `|| [ -n "$f" ]`: changed_carts.txt has no trailing newline; a bare `read`
            # would drop the final line and a single-cart PR would produce an empty comment.
            while IFS= read -r f || [ -n "$f" ]; do
              [ -n "$f" ] || continue

              mkdir -p "pr_files/$(dirname "$f")"
              raw="https://raw.githubusercontent.com/$HEAD_REPO/$HEAD/$f"
              local_file="pr_files/$f"
              curl -fsSL "$raw" -o "$local_file"

              dec="$local_file.decoded.txt"
              python3 scripts/lz100png_decode.py "$local_file" > "$dec" 2>/dev/null || : > "$dec"

              # -- metadata: title/author from the cart header, the rest from games.json --
              title=$(sed -n 's/^title //p'  "$dec" | head -1)
              author=$(sed -n 's/^author //p' "$dec" | head -1)
              echo "### 🕹 ${title:-$(basename "$f")}${author:+ — by $author}"
              echo ""
              echo "<img src=\"$raw\" width=\"264\" alt=\"cartridge\">"
              echo ""
              meta=$(python3 meta_row.py "$f")
              if [ -n "$meta" ]; then
                echo "| id | version | category | tags | license |"
                echo "|---|---|---|---|---|"
                echo "$meta"
              else
                echo "⚠️ _no matching \`games.json\` entry for \`$f\` (cart path must match the entry's \`cart\` field)._"
              fi
              echo ""

              play="https://zzxzzk115.github.io/Lazy-100/?cart_url=$(python3 -c 'import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1], safe=""))' "$raw")"
              echo "▶ **[Play it in the browser]($play)**"
              echo ""

              # -- consistency: does the uploaded .lz100 match what's inside the PNG? --
              src="${f%.png}"
              src_local="pr_files/$src"
              if curl -fsSL "https://raw.githubusercontent.com/$HEAD_REPO/$HEAD/$src" -o "$src_local" 2>/dev/null; then
                if python3 same_cart.py "$dec" "$src_local"; then
                  echo "✅ \`$(basename "$src")\` matches the cartridge contents."
                else
                  echo "⚠️ **WARNING: \`$(basename "$src")\` does NOT match what is inside \`$(basename "$f")\`.**"
                  echo "The PNG cartridge is what players run — please re-export so both agree."
                fi
              else
                echo "_ℹ no \`.lz100\` source uploaded (optional; the code below is decoded from the PNG)._"
              fi
              echo ""

              echo "<details><summary>cart source: <code>$f</code></summary>"
              echo ""
              echo '```lua'
              awk 'BEGIN{s=1} /^__(gfx|gff|map|sfx|music|label)__$/{s=0} s' "$dec" | head -c 55000 || true
              echo ""
              echo '```'
              echo "</details>"
              echo ""
            done < changed_carts.txt
          } > comment.md

      - name: Create or update PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('comment.md', 'utf8');
            const marker = '<!-- lz100-extract -->';

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }